<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KB Physics Explorer</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <a href="/" class="toolbar-logo" title="KB Physics Explorer">
        <img src="/logo.svg" alt="KB Physics" width="28" height="28">
        <span class="toolbar-logo-text">KB <strong>Physics</strong></span>
      </a>

      <div id="toolbar-center">
        <div class="view-tabs">
          <button class="view-tab active" data-view="graph">Graph</button>
          <button class="view-tab" data-view="timeline">Timeline</button>
          <button class="view-tab" data-view="table">Table</button>
        </div>
        <div class="type-filters" id="type-filters"></div>
      </div>

      <div id="controls">
        <div class="tag-filter-wrapper">
          <button class="toolbar-btn" id="btn-tags">Tags</button>
          <div class="tag-dropdown" id="tag-dropdown"></div>
        </div>
        <div class="search-wrapper">
          <input type="text" id="search-input" placeholder="Search nodes...">
          <kbd class="search-shortcut" id="search-shortcut">&#8984;K</kbd>
        </div>
        <button class="toolbar-btn" id="btn-sidebar">Artifacts</button>
        <button class="toolbar-btn" id="btn-chat">Chat</button>
        <button class="toolbar-btn" id="btn-add-source">+ Add source</button>
      </div>
    </header>

    <aside id="sidebar">
      <div class="sidebar-header">Saved Artifacts</div>
      <div id="artifact-list"></div>
    </aside>

    <main id="viewer"></main>

    <aside id="reader-panel">
      <div class="reader-resize-handle" id="reader-resize"></div>
      <div class="reader-header">
        <div class="reader-breadcrumb" id="reader-breadcrumb"></div>
        <div class="reader-meta" id="reader-meta"></div>
        <button class="toolbar-btn" id="btn-reader-close">&times;</button>
      </div>
      <div class="reader-loading" id="reader-loading" style="display:none">
        <div class="agent-spinner"></div>
        <span>Loading article...</span>
      </div>
      <div class="reader-content" id="reader-content"></div>
    </aside>

    <aside id="chat-panel">
      <div class="chat-resize-handle" id="chat-resize"></div>
      <div class="chat-header">
        <span>Ask the KB</span>
        <button class="toolbar-btn" id="btn-chat-close">&times;</button>
      </div>
      <div id="chat-context-strip" style="display:none"></div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <textarea id="chat-input" placeholder="Ask a question about physics..." rows="1"></textarea>
        <button id="chat-send">Send</button>
      </div>
    </aside>
  </div>

  <div class="ingest-modal-backdrop" id="ingest-backdrop">
    <div class="ingest-modal" id="ingest-modal">
      <div class="ingest-modal-header">
        <span class="ingest-modal-title">Add source</span>
        <button class="toolbar-btn ingest-modal-close" id="ingest-close">&times;</button>
      </div>
      <div class="ingest-modal-body" id="ingest-body">
        <div id="ingest-form">
          <label class="ingest-label" for="ingest-url">Article or paper URL</label>
          <div class="ingest-input-row">
            <input type="url" id="ingest-url" placeholder="https://arxiv.org/abs/... or https://quantamagazine.org/...">
            <button id="ingest-start">Fetch & ingest</button>
          </div>
        </div>
        <div id="ingest-progress" style="display:none">
          <div class="agent-status" id="ingest-status">
            <span class="agent-spinner"></span>
            <span class="agent-status-text" id="ingest-status-text">Starting...</span>
            <span class="agent-elapsed" id="ingest-elapsed">0s</span>
          </div>
          <button class="ingest-stop-btn" id="ingest-stop">Stop</button>
          <div class="agent-tool-log" id="ingest-tool-log"></div>
          <div class="ingest-output" id="ingest-output"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip">
    <div class="tooltip-title"></div>
    <div class="tooltip-desc"></div>
    <span class="tooltip-type"></span>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
