<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1c2a3a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="hub" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a5d6ff"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>

  <!-- Pentagon satellite positions (r=15 from center 24,24):
       top:          (24, 9)
       top-right:    (38, 19)
       bottom-right: (33, 36)
       bottom-left:  (15, 36)
       top-left:     (10, 19)
  -->

  <!-- Outer edges (subtle, between adjacent satellites) -->
  <path d="M24,9  Q32,12 38,19" fill="none" stroke="#8b949e" stroke-width="0.7" stroke-opacity="0.28" stroke-linecap="round"/>
  <path d="M38,19 Q37,29 33,36" fill="none" stroke="#8b949e" stroke-width="0.7" stroke-opacity="0.28" stroke-linecap="round"/>
  <path d="M15,36 Q11,27 10,19" fill="none" stroke="#8b949e" stroke-width="0.7" stroke-opacity="0.28" stroke-linecap="round"/>
  <!-- Diagonal cross edge (makes it feel more like a graph, not a polygon) -->
  <path d="M38,19 Q28,30 15,36" fill="none" stroke="#8b949e" stroke-width="0.7" stroke-opacity="0.18" stroke-linecap="round"/>
  <path d="M24,9  Q17,24 15,36" fill="none" stroke="#8b949e" stroke-width="0.7" stroke-opacity="0.18" stroke-linecap="round"/>

  <!-- Hub to satellite edges (colored by type) -->
  <!-- theory: red → top -->
  <path d="M24,24 Q25,16 24,9"  fill="none" stroke="#ff6b6b" stroke-width="1.4" stroke-opacity="0.65" stroke-linecap="round"/>
  <!-- concept: teal → top-right -->
  <path d="M24,24 Q33,20 38,19" fill="none" stroke="#4ecdc4" stroke-width="1.4" stroke-opacity="0.65" stroke-linecap="round"/>
  <!-- experiment: green → bottom-right -->
  <path d="M24,24 Q32,32 33,36" fill="none" stroke="#7ee787" stroke-width="1.4" stroke-opacity="0.65" stroke-linecap="round"/>
  <!-- person: blue → bottom-left -->
  <path d="M24,24 Q16,32 15,36" fill="none" stroke="#58a6ff" stroke-width="1.4" stroke-opacity="0.65" stroke-linecap="round"/>
  <!-- open-question: yellow → top-left -->
  <path d="M24,24 Q15,20 10,19" fill="none" stroke="#feca57" stroke-width="1.4" stroke-opacity="0.65" stroke-linecap="round"/>

  <!-- Satellite nodes -->
  <circle cx="24" cy="9"  r="3.2" fill="#ff6b6b" filter="url(#softshadow)"/>
  <circle cx="38" cy="19" r="2.8" fill="#4ecdc4" filter="url(#softshadow)"/>
  <circle cx="33" cy="36" r="2.8" fill="#7ee787" filter="url(#softshadow)"/>
  <circle cx="15" cy="36" r="2.8" fill="#58a6ff" filter="url(#softshadow)"/>
  <circle cx="10" cy="19" r="2.8" fill="#feca57" filter="url(#softshadow)"/>

  <!-- Central hub (glowing) -->
  <circle cx="24" cy="24" r="5.5" fill="url(#hub)" filter="url(#glow)"/>
  <circle cx="24" cy="24" r="3.2" fill="#cae8ff"/>
</svg>
